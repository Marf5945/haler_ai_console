.outline-fine { fill: none; stroke: #1a2a5e; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
.outline-hair { fill: none; stroke: #2a3d7a; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
.fill-accent { fill: #c0cde8; stroke: none; }
.fill-eye { fill: #1a2a5e; }
.fill-highlight { fill: #e8edf8; stroke: none; }
</style>
