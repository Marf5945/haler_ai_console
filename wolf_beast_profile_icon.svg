<svg width="512" height="512" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>側面狼犬獸人頭像 app icon</title>
<desc>線條描邊風格的狼犬獸人側面頭像，深藍與銀白配色，神秘深邃的半閉眼神，面朝左方</desc>
<defs>
<style>
.outline-main { fill: none; stroke: #1a2a5e; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
